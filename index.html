<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Slot Machine - ရှမ်းကိုးမီး အပေါက်စက်</title>
    <style>
        body {
            background: linear-gradient(145deg, #1e2a2e, #0f1a1f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
        }
        .slot-container {
            background: #2c2118;
            padding: 30px;
            border-radius: 60px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            text-align: center;
        }
        .reels {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 25px 0;
        }
        .reel {
            background: #fff2df;
            width: 110px;
            height: 130px;
            border-radius: 24px;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 3px #e4b363, 0 8px 15px black;
            font-weight: bold;
        }
        button {
            background: #f39c12;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            padding: 12px 35px;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 #b45f1b;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #b45f1b; }
        .result {
            background: black;
            color: gold;
            padding: 12px;
            border-radius: 48px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="slot-container">
    <h2 style="color:#ffdd99;">🎰 ရှမ်းကိုးမီး Slot 🎰</h2>
    <div class="reels">
        <div class="reel" id="reel1">🍒</div>
        <div class="reel" id="reel2">🍒</div>
        <div class="reel" id="reel3">🍒</div>
    </div>
    <button id="spinBtn">🌀 လှည့်မယ် 🌀</button>
    <div class="result" id="resultMsg">ခလုတ်နှိပ်ပါ</div>
</div>
<script>
    const symbols = ["🍒", "🍋", "🍊", "7️⃣", "💎", "🔔"];
    const payouts = {
        "🍒🍒🍒": 50,
        "🍋🍋🍋": 40,
        "🍊🍊🍊": 40,
        "7️⃣7️⃣7️⃣": 200,
        "💎💎💎": 150,
        "🔔🔔🔔": 60,
        // two same
    };
    function getRandomSymbol() {
        return symbols[Math.floor(Math.random() * symbols.length)];
    }
    function spin() {
        let s1 = getRandomSymbol();
        let s2 = getRandomSymbol();
        let s3 = getRandomSymbol();
        document.getElementById("reel1").innerText = s1;
        document.getElementById("reel2").innerText = s2;
        document.getElementById("reel3").innerText = s3;
        let key = s1+s2+s3;
        let prize = 0;
        if(payouts[key]) prize = payouts[key];
        else if(s1 === s2 && s2 !== s3) prize = 10;
        else if(s2 === s3 && s1 !== s2) prize = 10;
        else if(s1 === s3 && s1 !== s2) prize = 10;
        else prize = 0;
        if(prize > 0) document.getElementById("resultMsg").innerHTML = `🎉 ဆုရသည် ${prize} အမှတ် 🎉`;
        else document.getElementById("resultMsg").innerHTML = "😢 နောက်တစ်ခါ ကံစမ်းပါ";
    }
    document.getElementById("spinBtn").onclick = spin;
</script>
</body>
</html>
